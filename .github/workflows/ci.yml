name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # ── Python tests ──────────────────────────────────────────────────────
  python-tests:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements-dev.txt
            requirements-agent.txt

      - name: Install Python test dependencies
        run: pip install -r requirements-dev.txt -r requirements-agent.txt

      - name: Run Python tests
        run: pytest tests/ -v

      - name: Import local MCP agent server
        run: python3 -c "import agent.splunk_cisco_skills_mcp.server; print('local MCP agent import ok')"

  # ── Bats tests ────────────────────────────────────────────────────────
  bats-tests:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Install Bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run Bats tests
        run: bats tests/*.bats

  # ── ShellCheck + syntax ───────────────────────────────────────────────
  shellcheck:
    runs-on: ubuntu-24.04
    env:
      SHELLCHECK_VERSION: "0.10.0"
      # SHA256 of shellcheck-v0.10.0.linux.x86_64.tar.xz from
      # https://github.com/koalaman/shellcheck/releases/tag/v0.10.0
      # Update this hash whenever SHELLCHECK_VERSION changes.
      SHELLCHECK_SHA256: "6c881ab0698e4e6ea235245f22832860544f17ba386442fe7e9d629f8cbedf87"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Install ShellCheck
        run: |
          set -euo pipefail
          archive="shellcheck-v${SHELLCHECK_VERSION}.linux.x86_64.tar.xz"
          curl -sSL --fail \
            "https://github.com/koalaman/shellcheck/releases/download/v${SHELLCHECK_VERSION}/${archive}" \
            -o "${archive}"
          echo "${SHELLCHECK_SHA256}  ${archive}" | sha256sum -c -
          tar -xJf "${archive}" --strip-components=1 -C /usr/local/bin "shellcheck-v${SHELLCHECK_VERSION}/shellcheck"
          rm -f "${archive}"
          shellcheck --version

      - name: Syntax-check shell scripts
        run: |
          python3 - <<'PY'
          import subprocess
          from pathlib import Path

          files = sorted(str(path) for path in Path("skills").rglob("*.sh"))
          if not files:
              raise SystemExit("No shell scripts found under skills/")

          for file_path in files:
              subprocess.run(["bash", "-n", file_path], check=True)
          PY

      - name: ShellCheck first-party scripts
        run: |
          python3 - <<'PY'
          import subprocess
          from pathlib import Path

          files = sorted(str(path) for path in Path("skills").rglob("*.sh"))
          if not files:
              raise SystemExit("No shell scripts found under skills/")

          subprocess.run(["shellcheck", "--severity=warning", *files], check=True)
          PY

  # ── Validation (lints, schema checks, freshness) ─────────────────────
  validation:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install validation tools
        run: pip install -r requirements-dev.txt

      - name: Validate JSON files
        run: |
          python3 - <<'PY'
          import json
          import sys
          from pathlib import Path

          errors = []
          json_files = sorted(Path("skills").rglob("*.json"))
          if not json_files:
              raise SystemExit("No JSON files found under skills/")

          for path in json_files:
              try:
                  json.loads(path.read_text(encoding="utf-8"))
              except json.JSONDecodeError as exc:
                  errors.append(f"{path}: {exc}")

          if errors:
              print("JSON validation errors:", file=sys.stderr)
              for err in errors:
                  print(f"  - {err}", file=sys.stderr)
              raise SystemExit(1)

          print(f"All {len(json_files)} JSON files are valid.")
          PY

      - name: Lint YAML (GitHub, workflow files, and ITSI templates/agents)
        run: |
          yamllint -c .yamllint.yml \
            .github/ \
            skills/splunk-itsi-config/templates \
            skills/splunk-itsi-config/agents

      - name: Lint Python with ruff
        run: ruff check skills/ tests/ agent/

      - name: Check catalog freshness
        run: |
          if ls splunk-ta/splunk-cisco-app-navigator-*.tar.gz 1>/dev/null 2>&1; then
            python3 skills/cisco-product-setup/scripts/build_catalog.py --check
          else
            echo "WARNING: SCAN package not in tree (gitignored binary); catalog freshness check skipped."
            echo "  If you modified catalog_overrides.json, rebuild catalog.json locally with:"
            echo "  python3 skills/cisco-product-setup/scripts/build_catalog.py --write"
          fi

      - name: Check deployment docs freshness
        run: python3 skills/shared/scripts/generate_deployment_docs.py --check

      - name: Check SKILL.md frontmatter
        run: python3 tests/check_skill_frontmatter.py

      - name: Check repository readiness
        run: python3 tests/check_repo_readiness.py

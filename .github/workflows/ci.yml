name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: "0 9 * * 1"  # weekly Monday 09:00 UTC

permissions:
  contents: read

jobs:
  checks:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    env:
      SHELLCHECK_VERSION: "0.10.0"
      SHELLCHECK_SHA256: "6c881ab0698e4e6ea235245f22832860544f17ba386442fe7e9d629f8cbedf87"
      BATS_VERSION: "1.11.1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python test dependencies
        run: pip install -r requirements.txt

      - name: Install Bats
        run: |
          curl -sSL "https://github.com/bats-core/bats-core/archive/refs/tags/v${BATS_VERSION}.tar.gz" \
            | tar -xzf - -C /tmp
          sudo /tmp/bats-core-${BATS_VERSION}/install.sh /usr/local
          bats --version

      - name: Install ShellCheck (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -sSL -o /tmp/shellcheck.tar.xz \
            "https://github.com/koalaman/shellcheck/releases/download/v${SHELLCHECK_VERSION}/shellcheck-v${SHELLCHECK_VERSION}.linux.x86_64.tar.xz"
          echo "${SHELLCHECK_SHA256}  /tmp/shellcheck.tar.xz" | sha256sum -c -
          tar -xJf /tmp/shellcheck.tar.xz --strip-components=1 -C /usr/local/bin "shellcheck-v${SHELLCHECK_VERSION}/shellcheck"
          shellcheck --version

      - name: Install ShellCheck (macOS)
        if: runner.os == 'macOS'
        run: brew install shellcheck

      - name: Lint Python code
        run: |
          ruff check tests/ skills/
          ruff format --check tests/ skills/

      - name: Run Python tests
        timeout-minutes: 10
        run: pytest tests/ -v --cov=skills --cov=tests --cov-report=term-missing --cov-report=html:coverage-html

      - name: Upload coverage report
        if: always() && runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage-html/
          retention-days: 14

      - name: Run Bats tests
        timeout-minutes: 5
        run: bats tests/*.bats

      - name: Syntax-check shell scripts
        run: |
          python3 - <<'PY'
          import subprocess
          from pathlib import Path

          files = sorted(str(path) for path in Path("skills").rglob("*.sh"))
          if not files:
              raise SystemExit("No shell scripts found under skills/")

          for file_path in files:
              subprocess.run(["bash", "-n", file_path], check=True)
          PY

      - name: ShellCheck first-party scripts
        run: |
          python3 - <<'PY'
          import subprocess
          from pathlib import Path

          files = sorted(str(path) for path in Path("skills").rglob("*.sh"))
          if not files:
              raise SystemExit("No shell scripts found under skills/")

          subprocess.run(["shellcheck", "--severity=warning", *files], check=True)
          PY

name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-24.04

    env:
      SHELLCHECK_VERSION: "0.10.0"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Install Python test dependencies
        run: pip install "pytest>=8,<9"

      - name: Install shell tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Install ShellCheck
        run: |
          curl -sSL "https://github.com/koalaman/shellcheck/releases/download/v${SHELLCHECK_VERSION}/shellcheck-v${SHELLCHECK_VERSION}.linux.x86_64.tar.xz" \
            | tar -xJf - --strip-components=1 -C /usr/local/bin "shellcheck-v${SHELLCHECK_VERSION}/shellcheck"
          shellcheck --version

      - name: Run Python tests
        run: pytest tests/ -v

      - name: Run Bats tests
        run: bats tests/*.bats

      - name: Syntax-check shell scripts
        run: |
          python3 - <<'PY'
          import subprocess
          from pathlib import Path

          files = sorted(str(path) for path in Path("skills").rglob("*.sh"))
          if not files:
              raise SystemExit("No shell scripts found under skills/")

          for file_path in files:
              subprocess.run(["bash", "-n", file_path], check=True)
          PY

      - name: ShellCheck first-party scripts
        run: |
          python3 - <<'PY'
          import subprocess
          from pathlib import Path

          files = sorted(str(path) for path in Path("skills").rglob("*.sh"))
          if not files:
              raise SystemExit("No shell scripts found under skills/")

          subprocess.run(["shellcheck", "--severity=warning", *files], check=True)
          PY

# Beginner content-pack starter.
# Replace the connection and pack profile values, then run:
#   bash scripts/setup.sh --workflow content-packs --spec templates/beginner.content-pack.yaml

connection:
  # Leave blank to use SPLUNK_SEARCH_API_URI from the credentials file.
  base_url: ""
  session_key_env: SPLUNK_SESSION_KEY
  verify_ssl: false
  platform: auto

itsi:
  require_present: true
  install_if_missing: true
  source: splunkbase
  app_id: "1841"

content_library:
  require_present: true
  install_if_missing: true
  source: splunkbase
  app_id: "5391"

# Supported profiles:
# aws, cisco_data_center, cisco_enterprise_networks, cisco_thousandeyes,
# linux, splunk_appdynamics, splunk_observability_cloud, vmware, windows.
#
# Keep one pack in the first pass. Add more after preview and validation are clean.
packs:
  - profile: cisco_thousandeyes
    resolution: skip
    enabled: false
    saved_search_action: disable
    install_all: true
    backfill: false
    prefix: "Starter - "
    index_macro_value: index="thousandeyes"

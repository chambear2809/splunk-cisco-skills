name: Splunk Connect for SNMP MCP Tools
description: Read-only MCP tools for SC4SNMP Splunk-side readiness and data checks.
version: 1.0.0
author: splunk-connect-for-snmp-setup skill
external_app_id: sc4snmp
tools:
  - id: indexes
    title: SC4SNMP Event And Metrics Indexes
    description: Check SC4SNMP event and metrics index readiness.
    tags: [sc4snmp, snmp, indexes]
    time_range: false
    row_limiter: true
    spl: |
      | rest /services/data/indexes count=0 | search title=sc4snmp OR title=sc4snmp_metrics OR title=netops_metrics | table title disabled datatype totalEventCount currentDBSizeMB maxTotalDataSizeMB splunk_server | sort title
    examples: [List SC4SNMP indexes]
  - id: hec_tokens
    title: SC4SNMP HEC Token State
    description: Check HEC tokens that appear to target SC4SNMP indexes.
    tags: [sc4snmp, hec, tokens]
    time_range: false
    row_limiter: true
    spl: |
      | rest /services/data/inputs/http count=0 | search title=*sc4snmp* OR indexes=*sc4snmp* OR indexes=*netops_metrics* | table title disabled index indexes useACK sourcetype outputgroup | sort title
    examples: [Check SC4SNMP HEC tokens]
  - id: indexed_events
    title: SC4SNMP Indexed Events
    description: Summarize recent SC4SNMP event data by sourcetype and host.
    tags: [sc4snmp, snmp, data]
    time_range: true
    row_limiter: true
    spl: |
      | tstats count latest(_time) as latest where index=sc4snmp by index sourcetype host | eval latest=strftime(latest,"%Y-%m-%dT%H:%M:%SZ") | sort -count
    examples: [Show recent SC4SNMP events]
  - id: metric_catalog
    title: SC4SNMP Metric Catalog
    description: List visible SC4SNMP metric names from Splunk metrics indexes.
    tags: [sc4snmp, snmp, metrics]
    time_range: true
    row_limiter: true
    spl: |
      | mcatalog values(metric_name) as metric_name where index=sc4snmp_metrics OR index=netops_metrics by metric_name | sort metric_name
    examples: [Show SC4SNMP metric catalog]
  - id: collector_logs
    title: SC4SNMP Collector Logs
    description: Summarize recent collector log events visible in Splunk.
    tags: [sc4snmp, collector, logs]
    time_range: true
    row_limiter: true
    spl: |
      search index=sc4snmp (sourcetype=sc4snmp:collector OR source=*sc4snmp*) | stats count latest(_time) as latest by host source sourcetype | eval latest=strftime(latest,"%Y-%m-%dT%H:%M:%SZ") | sort -latest
    examples: [Show SC4SNMP collector logs]
coverage:
  - id: event_index
    status: mcp_tool
    tool: indexes
  - id: metrics_index
    status: mcp_tool
    tool: indexes
  - id: hec_token_state
    status: mcp_tool
    tool: hec_tokens
  - id: indexed_event_data
    status: mcp_tool
    tool: indexed_events
  - id: metric_catalog_visibility
    status: mcp_tool
    tool: metric_catalog
  - id: collector_log_data
    status: mcp_tool
    tool: collector_logs

 <form class="splunk-formatter-section" section-label="General">


	<splunk-control-group label="Skin">
		<splunk-select name="{{VIZ_NAMESPACE}}.skin" value="lion">
			<option value="win8">Win8</option>
			<option value="win8xxl">Win8 XXL</option>
			<option value="lion">Lion</option>
			<option value="custom">Custom</option>
		</splunk-select>
	</splunk-control-group>

	<splunk-control-group label="Show Connectors" help=" ">
		<splunk-radio-input name="{{VIZ_NAMESPACE}}.showConnectors" value="true">
			<option value="true">True</option>
			<option value="false">False</option>
		</splunk-radio-input>
	</splunk-control-group>


	<splunk-control-group label="Show Checkboxes" help=" ">
		<splunk-radio-input name="{{VIZ_NAMESPACE}}.showCheckbox" value="false">
			<option value="true">True</option>
			<option value="false">False</option>
		</splunk-radio-input>
	</splunk-control-group>

	<splunk-control-group label="Show Icons" help=" ">
		<splunk-radio-input name="{{VIZ_NAMESPACE}}.showIcons" value="true">
			<option value="true">True</option>
			<option value="false">False</option>
		</splunk-radio-input>
	</splunk-control-group>


	<splunk-control-group label="Select Mode" help=" ">
		<splunk-radio-input name="{{VIZ_NAMESPACE}}.selectMode" value="single">
			<option value="single">Single</option>
			<option value="multi">Multi</option>
		</splunk-radio-input>
	</splunk-control-group>

	<splunk-control-group label="Default Selection" help=" ">
		<splunk-radio-input name="{{VIZ_NAMESPACE}}.defaultSelection" value="closed">
			<option value="false">Unselected</option>
			<option value="true">Selected</option>
		</splunk-radio-input>
	</splunk-control-group>


	<splunk-control-group label="Initial State" help=" ">
		<splunk-radio-input name="{{VIZ_NAMESPACE}}.initialState" value="closed">
			<option value="closed">Closed</option>
			<option value="open">Open</option>
		</splunk-radio-input>
	</splunk-control-group>

	
	<splunk-control-group label="Font Size" help=" ">
		<splunk-radio-input name="{{VIZ_NAMESPACE}}.fontSize" value="10">
			<option value="10">10</option>
			<option value="12">12</option>
			<option value="14">14</option>
			<option value="16">16</option>
			<option value="18">18</option>
		</splunk-radio-input>
	</splunk-control-group>

</form>


<form class="splunk-formatter-section" section-label="Accordion">
<splunk-control-group label="Accordion Mode" help=" ">
		<splunk-radio-input name="{{VIZ_NAMESPACE}}.accordionMode" value="false">
			<option value="true">True</option>
			<option value="false">False</option>
		</splunk-radio-input>
	</splunk-control-group>
	 
	<splunk-control-group label="Accordion Background" help=" ">
        <splunk-color-picker type="custom" value="#efefef" name="{{VIZ_NAMESPACE}}.accordionModeBgColor" >
		 <splunk-color>#ffffff</splunk-color>
		 <splunk-color>#173f5f</splunk-color>
		 <splunk-color>#20639b</splunk-color>
		 <splunk-color>#3caea3</splunk-color>
		 <splunk-color>#f6d55c</splunk-color>
		 <splunk-color>#F5F5F5</splunk-color>
		 <splunk-color>#d0d0d0</splunk-color>
		 <splunk-color>#888888</splunk-color>
		 <splunk-color>#505050</splunk-color>
		 <splunk-color>#000000</splunk-color>
		</splunk-color-picker>
    </splunk-control-group>
	 
	<splunk-control-group label="Accordion Text" help=" ">
        <splunk-color-picker type="custom" value="#000000" name="{{VIZ_NAMESPACE}}.accordionModeTextColor" >
		 <splunk-color>#ffffff</splunk-color>
		 <splunk-color>#173f5f</splunk-color>
		 <splunk-color>#20639b</splunk-color>
		 <splunk-color>#3caea3</splunk-color>
		 <splunk-color>#f6d55c</splunk-color>
		 <splunk-color>#000000</splunk-color>
		</splunk-color-picker>
    </splunk-control-group>
	
	<splunk-control-group label="Auto Collapse Nodes" help="Only allow one node to expand at a time.">
		<splunk-radio-input name="{{VIZ_NAMESPACE}}.autoCollapse" value="false">
			<option value="true">True</option>
			<option value="false">False</option>
		</splunk-radio-input>
	</splunk-control-group>
	
	<splunk-control-group label="Minimum Width px" help=" ">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.accordionMinWidth" value="200"></splunk-text-input>
    </splunk-control-group>
	
	
</form>

<form class="splunk-formatter-section" section-label="Sorting">
	<splunk-control-group label="Show Folders First" help=" ">
		<splunk-radio-input name="{{VIZ_NAMESPACE}}.showFoldersFirst" value="true">
			<option value="true">True</option>
			<option value="false">False</option>
		</splunk-radio-input>
	</splunk-control-group>

	 <splunk-control-group label="Sort By" help=" ">
		<splunk-select name="{{VIZ_NAMESPACE}}.sortBy" value="label">
			<option value="label">Label</option>
			<option value="id">ID</option>
			<option value="as-is">As-Is</option>
		</splunk-radio-input>
	</splunk-control-group>
</form>


<form class="splunk-formatter-section" section-label="Tokens">
    <splunk-control-group label="Label" help=" ">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.tokenLabel" value="tv_label_token"></splunk-text-input>
    </splunk-control-group>
	<splunk-control-group label="ID" help=" ">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.tokenId" value="tv_id_token"></splunk-text-input>
    </splunk-control-group>
	<splunk-control-group label="Parent ID" help="Settings for Mulitselect:">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.tokenParentId" value="tv_parent_id_token"></splunk-text-input>
    </splunk-control-group>
	
	
	
	<splunk-control-group label="Token Value Prefix" help=" ">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.tokenValuePrefix" value='"'></splunk-text-input>
    </splunk-control-group>
	<splunk-control-group label="Token Value Suffix" help=" ">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.tokenValueSuffix" value='"'></splunk-text-input>
    </splunk-control-group>
	<splunk-control-group label="Delimiter" help=" ">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.tokenDelimiter" value=","></splunk-text-input>
    </splunk-control-group>
	<splunk-control-group label="Token Prefix" help=" ">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.tokenPrefix" value='"'></splunk-text-input>
    </splunk-control-group>
	<splunk-control-group label="Token Suffix" help=" ">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.tokenSuffix" value='"'></splunk-text-input>
    </splunk-control-group>
</form>
